<main class="container" style="padding: 40px 0;">
    <h1 style="margin-bottom: 24px;">Connexion</h1>

    <form method="POST" action="?page=connexion">
        
        <div style="margin-bottom: 16px;">
            <label>Email :</label><br>
            <input type="email" name="email" required style="width: 300px; padding: 8px;">
        </div>

        <div style="margin-bottom: 16px;">
            <label>Mot de passe :</label><br>
            <input type="password" name="password" required style="width: 300px; padding: 8px;">
        </div>

        <button type="submit" style="
            background: #FF8C00;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        ">
            Se connecter
        </button>

    </form>
</main>
