<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Footer</title>
    <style>
        footer {
            background-color: #303C6C;

            padding: 20px;

        }

            margin: 0;
            font-family: Inter, sans-serif;
        }

        .footer-column {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap : 40px;
        }

        .footer-column > div {
            flex: 0 0 200px;
            text-align: left;
        }

        .footer-column p {
            color: #ffffff;
        }

        .footer-column h1 {
            font-size: 2rem;
            color : #E88600;
            margin: 0 0 10px 0;
        }

        .footer-column > div p,
        .footer-column > div a,
        .footer-column > div h3 {
            margin: 0 0 10px 0;
            display: block;
        }

        .logo-Share {
            font-size: 2rem;
            font-weight: 800;
            color: #E88600;
        }

        .logo-Time {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        footer a {
            text-decoration: none;
            color: inherit;
        }

        footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>
